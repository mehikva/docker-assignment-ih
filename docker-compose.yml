version: '3.8'

services:

  # ── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: notes_db
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persist data across restarts
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node/Express) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes_backend
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/notes_db
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy   # wait until DB is ready
    networks:
      - app_network

  # ── Frontend (React + nginx) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notes_frontend
    environment:
      REACT_APP_API_URL: http://20.233.253.167:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app_network

# ── Named Volume ─────────────────────────────────────
volumes:
  postgres_data:

# ── Custom Network ────────────────────────────────────
networks:
  app_network:
    driver: bridge
